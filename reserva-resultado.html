<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Resultado de reserva - TurismoGO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f7fbff 0%, #eef5ff 100%);
      color: #08256f;
      min-height: 100vh;
    }

    .topbar {
      height: 76px;
      padding: 0 34px;
      background: #ffffff;
      border-bottom: 1px solid #e5eaf5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 18px rgba(8, 37, 111, 0.06);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: #08256f;
      font-weight: 800;
      font-size: 22px;
    }

    .brand img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      display: block;
    }

    .topbar a.back-link {
      color: #08256f;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
    }

    .topbar a.back-link:hover {
      text-decoration: underline;
    }

    .page {
      min-height: calc(100vh - 76px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 42px 20px;
    }

    .card {
      background: #ffffff;
      max-width: 560px;
      width: 100%;
      padding: 42px;
      border-radius: 24px;
      box-shadow: 0 18px 45px rgba(8, 37, 111, 0.12);
      text-align: center;
      border: 1px solid #e3ebfb;
    }

    .status-icon {
      width: 82px;
      height: 82px;
      margin: 0 auto 22px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      background: #eaf3ff;
      color: #08256f;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 34px;
      line-height: 1.15;
      color: #08256f;
    }

    p {
      font-size: 17px;
      line-height: 1.6;
      color: #4966a3;
      margin: 0;
    }

    .success {
      color: #15803d;
    }

    .error {
      color: #b91c1c;
    }

    .warning {
      color: #b45309;
    }

    .actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .btn {
      display: inline-block;
      padding: 14px 24px;
      background: #ff6236;
      color: #ffffff;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(255, 98, 54, 0.22);
    }

    .btn:hover {
      background: #e6522b;
    }

    .btn-secondary {
      background: #08256f;
      box-shadow: 0 10px 24px rgba(8, 37, 111, 0.18);
    }

    .btn-secondary:hover {
      background: #061b52;
    }

    .note {
      margin-top: 24px;
      font-size: 14px;
      color: #64748b;
    }

    @media (max-width: 700px) {
      .topbar {
        padding: 0 18px;
      }

      .brand {
        font-size: 18px;
      }

      .brand img {
        width: 46px;
        height: 46px;
      }

      .card {
        padding: 30px 22px;
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <a href="index.html" class="brand">
      <img src="favicon.png" alt="TurismoGO">
      <span>TurismoGO</span>
    </a>

    <a href="index.html" class="back-link">Volver al inicio</a>
  </header>

  <main class="page">
    <div class="card">
      <div class="status-icon" id="icono">⏳</div>

      <h1 id="titulo">Procesando resultado...</h1>
      <p id="mensaje">Estamos verificando el estado de tu reserva.</p>

      <div class="actions">
        <a class="btn" href="index.html#servicios-publicos-section">Ver servicios</a>
        <a class="btn btn-secondary" href="index.html">Volver al inicio</a>
      </div>

      <p class="note">
        Si tienes dudas sobre tu reserva, puedes contactar al soporte de TurismoGO.
      </p>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const pago = params.get('pago');

    const titulo = document.getElementById('titulo');
    const mensaje = document.getElementById('mensaje');
    const icono = document.getElementById('icono');

    if (pago === 'exitoso') {
      icono.textContent = '✅';
      titulo.textContent = 'Reserva confirmada';
      titulo.className = 'success';
      mensaje.textContent = 'Tu pago fue aprobado correctamente. La reserva quedó registrada y confirmada.';
    } else if (pago === 'fallido') {
      icono.textContent = '❌';
      titulo.textContent = 'Pago fallido';
      titulo.className = 'error';
      mensaje.textContent = 'El pago no pudo ser aprobado. Puedes intentar realizar la reserva nuevamente.';
    } else if (pago === 'cancelado') {
      icono.textContent = '⚠️';
      titulo.textContent = 'Pago cancelado';
      titulo.className = 'warning';
      mensaje.textContent = 'La operación fue cancelada antes de finalizar el pago.';
    } else {
      icono.textContent = '⚠️';
      titulo.textContent = 'No fue posible confirmar la reserva';
      titulo.className = 'error';
      mensaje.textContent = 'Ocurrió un problema al validar el pago. Si realizaste el cobro, contacta al soporte.';
    }
  </script>

</body>
</html>
