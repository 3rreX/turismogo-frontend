<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    #servicios, #reservas {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.2s;
      padding-bottom: 10px;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card h3, .card p {
      margin: 10px;
    }

    input {
      margin: 5px 10px;
      padding: 5px;
      width: calc(100% - 20px);
    }

    button {
      margin: 10px;
      padding: 10px;
      width: calc(100% - 20px);
      background: #ff5a5f;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #e04848;
    }

    #perfil {
      text-align: center;
      margin-bottom: 20px;
      font-weight: bold;
    }

    h3 {
      margin-top: 30px;
    }
  </style>
</head>
<body>

  <h2>Dashboard</h2>

  <div id="perfil"></div>
<div id="panel-propietario" style="display:none; margin: 20px 0; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
  <h3>Publicar nuevo servicio</h3>

  <input id="nuevo-nombre" placeholder="Nombre del servicio">
  <input id="nuevo-descripcion" placeholder="Descripción">
  <input id="nuevo-precio" type="number" placeholder="Precio">
  <input id="nuevo-imagen" type="file" accept="image/*">
  <img id="preview-imagen" style="width:100%; margin-top:10px; border-radius:10px; display:none;">

  <button onclick="crearServicio()">Publicar servicio</button>
</div>
  <h3>Servicios disponibles</h3>
  <div id="servicios"></div>

  <h3>Mis reservas</h3>
  <div id="reservas"></div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
